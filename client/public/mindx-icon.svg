<svg
  width="512"
  height="512"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="title desc"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="title">MindX Todo icon</title>
  <desc id="desc">A rounded gradient app icon with a checked task card and MX lettering.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5" />
      <stop offset="1" stop-color="#0f766e" />
    </linearGradient>
    <linearGradient id="card" x1="160" y1="104" x2="360" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#eef2ff" />
    </linearGradient>
    <filter
      id="shadow"
      x="64"
      y="72"
      width="384"
      height="392"
      color-interpolation-filters="sRGB"
      filterUnits="userSpaceOnUse"
    >
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#14161f" flood-opacity="0.28" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <circle cx="120" cy="116" r="82" fill="#ffffff" opacity="0.12" />
  <circle cx="412" cy="394" r="118" fill="#cdf3ec" opacity="0.16" />
  <path
    d="M91 367c75-73 151-104 229-94 48 6 84 27 111 63"
    fill="none"
    stroke="#ffffff"
    stroke-width="22"
    stroke-linecap="round"
    opacity="0.18"
  />

  <g filter="url(#shadow)">
    <rect x="128" y="104" width="256" height="304" rx="48" fill="url(#card)" />
    <rect x="168" y="154" width="176" height="18" rx="9" fill="#4f46e5" opacity="0.26" />
    <rect x="168" y="196" width="128" height="18" rx="9" fill="#0f766e" opacity="0.22" />
    <circle cx="188" cy="255" r="33" fill="#0f766e" />
    <path
      d="m172 256 12 12 27-31"
      fill="none"
      stroke="#ffffff"
      stroke-width="13"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <rect x="236" y="239" width="108" height="14" rx="7" fill="#1e2233" opacity="0.2" />
    <rect x="236" y="267" width="82" height="14" rx="7" fill="#1e2233" opacity="0.13" />
    <text
      x="256"
      y="350"
      text-anchor="middle"
      font-family="Inter, Segoe UI, Arial, sans-serif"
      font-size="64"
      font-weight="900"
      letter-spacing="-5"
      fill="#3730a3"
    >
      MX
    </text>
  </g>
</svg>
