services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: todo_app
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U todo -d todo_app" ]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 12
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: /api
      CORS_ORIGIN: http://localhost,http://localhost:8080,http://localhost:5173
      DATABASE_URL: postgresql://todo:todo@postgres:5432/todo_app?schema=public
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: 60
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    depends_on:
      - client
      - server
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
