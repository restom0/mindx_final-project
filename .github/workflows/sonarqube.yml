name: Sonar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  gate:
    name: Check token
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Skip the scan cleanly when SONAR_TOKEN is not configured.
        run: echo "run=${SONAR_TOKEN:+true}" >> "$GITHUB_OUTPUT"

  sonar:
    name: SonarCloud scan
    needs: gate
    if: needs.gate.outputs.run == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
