services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: todo_app
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo_app"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    ports:
      - "6379:6379"
    restart: unless-stopped

  server:
    image: ${MINDX_SERVER_IMAGE:-ghcr.io/restom0/mindx-final-project-server:latest}
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: /api
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:8080}
      DATABASE_URL: ${DATABASE_URL:-postgresql://todo:todo@postgres:5432/todo_app?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
      HEALTH_RATE_LIMIT_WINDOW_MS: ${HEALTH_RATE_LIMIT_WINDOW_MS:-60000}
      HEALTH_RATE_LIMIT_MAX: ${HEALTH_RATE_LIMIT_MAX:-60}
      TRUST_PROXY: ${TRUST_PROXY:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  client:
    image: ${MINDX_CLIENT_IMAGE:-ghcr.io/restom0/mindx-final-project-client:latest}
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - client
      - server
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
